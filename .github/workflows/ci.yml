name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: Rule test suite
        run: python tests/run_tests.py
      - name: Utility benchmark (recall / false-positive gate)
        run: python benchmarks/benchmark.py
      - name: Demo smoke test
        run: python check.py
      - name: Integration demo (repair loop)
        run: python integrations/semantic_gate.py
      - name: Package builds
        run: pip install build && python -m build
